name: README Review

on:
  pull_request:
    branches: [main]

jobs:
  readme-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: iteebz/readme-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
